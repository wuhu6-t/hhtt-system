<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交附件-分摊比例表处理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 40px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #fafafa;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #e8f0fe;
            transform: scale(1.02);
        }

        .upload-area.has-files {
            border-color: #11998e;
            background: #f0fff7;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 16px;
            color: #555;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 13px;
            color: #999;
        }

        .file-input, .folder-input {
            display: none;
        }

        .upload-options {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .option-btn {
            padding: 12px 30px;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .option-btn:hover {
            background: #f0f0f0;
            border-color: #667eea;
            color: #667eea;
        }

        .file-list {
            margin-top: 20px;
            display: none;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
        }

        .file-list.show {
            display: block;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: #f9f9f9;
            border-radius: 6px;
            margin-bottom: 6px;
            transition: all 0.2s ease;
        }

        .file-item:hover {
            background: #f0f0f0;
        }

        .file-icon {
            font-size: 18px;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .file-info {
            flex: 1;
            overflow: hidden;
        }

        .file-name {
            font-size: 14px;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
        }

        .file-path {
            font-size: 12px;
            color: #999;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
            margin-top: 2px;
        }

        .file-size {
            font-size: 12px;
            color: #999;
            margin-left: 10px;
            flex-shrink: 0;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-start {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }

        .btn-download {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .progress-section {
            margin-top: 30px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .toast.error {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .icon {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon::before {
            font-size: 18px;
        }

        .icon-start::before {
            content: '▶';
        }

        .icon-download::before {
            content: '↓';
        }

        .clear-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .clear-btn:hover {
            background: #eee;
            border-color: #ccc;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: #f5f5f5;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #666;
        }

        .stats-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stats-value {
            font-weight: 600;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 提交附件-分摊比例表处理系统</h1>
            <p>上传文件夹或文件后自动按区县拆分并分类处理</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label class="form-label">需要盖章附件：</label>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text" id="uploadText">点击选择或拖拽文件/文件夹到此处</div>
                    <div class="upload-hint">支持文件夹、.xlsx、.png、.docx、.pdf 等格式</div>
                </div>
                
                <input type="file" id="fileInput" class="file-input" multiple>
                <input type="file" id="folderInput" class="folder-input" webkitdirectory multiple>

                <div class="upload-options">
                    <button class="option-btn" onclick="document.getElementById('fileInput').click()">
                        📄 选择文件
                    </button>
                    <button class="option-btn" onclick="document.getElementById('folderInput').click()">
                        📂 选择文件夹
                    </button>
                </div>
                
                <div class="file-list" id="fileList">
                    <div class="stats-bar">
                        <div class="stats-item">📁 文件夹: <span class="stats-value" id="folderCount">0</span></div>
                        <div class="stats-item">📄 文件: <span class="stats-value" id="fileCount">0</span></div>
                        <div class="stats-item">📊 Excel: <span class="stats-value" id="excelCount">0</span></div>
                    </div>
                    <div id="selectedFiles"></div>
                    <button class="clear-btn" onclick="clearFiles()">清空选择</button>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-start" onclick="startProcess()" id="btnStart" disabled>
                    <span class="icon icon-start"></span>
                    开始处理
                </button>
                <button class="btn btn-download" onclick="downloadFiles()" id="btnDownload" disabled>
                    <span class="icon icon-download"></span>
                    下载文件
                </button>
            </div>

            <div class="progress-section" id="progressSection">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">正在处理...</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let selectedFiles = [];
        let uploadFormData = null;
        let processCompleted = false;
        let currentTaskId = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const folderInput = document.getElementById('folderInput');
        const uploadText = document.getElementById('uploadText');
        const fileList = document.getElementById('fileList');
        const selectedFilesDiv = document.getElementById('selectedFiles');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        uploadArea.addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        folderInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            processCompleted = false;
            uploadFormData = new FormData();
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const relativePath = file.webkitRelativePath || file.name;
                uploadFormData.append('files', file);
                uploadFormData.append(`relative_path_${i}`, relativePath);
            }

            selectedFiles = Array.from(files).map((f, index) => ({
                name: f.name,
                path: f.webkitRelativePath || f.name,
                size: (f.size / 1024).toFixed(1) + ' KB',
                type: getFileExtension(f.name)
            }));

            renderFileList();
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnDownload').disabled = true;
        }

        function getFileExtension(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (['xlsx', 'xls'].includes(ext)) return 'excel';
            if (['png', 'jpg', 'jpeg', 'gif', 'bmp'].includes(ext)) return 'image';
            if (['docx', 'doc'].includes(ext)) return 'word';
            if (['pdf'].includes(ext)) return 'pdf';
            if (['zip', 'rar', '7z'].includes(ext)) return 'archive';
            return 'other';
        }

        function getFileIcon(type) {
            switch(type) {
                case 'excel': return '📊';
                case 'image': return '🖼️';
                case 'word': return '📝';
                case 'pdf': return '📕';
                case 'archive': return '📦';
                default: return '📄';
            }
        }

        function renderFileList() {
            selectedFilesDiv.innerHTML = '';
            
            const folderCount = new Set(selectedFiles.map(f => f.path.substring(0, f.path.lastIndexOf('/')))).size;
            const fileCount = selectedFiles.length;
            const excelCount = selectedFiles.filter(f => f.type === 'excel').length;
            
            document.getElementById('folderCount').textContent = folderCount;
            document.getElementById('fileCount').textContent = fileCount;
            document.getElementById('excelCount').textContent = excelCount;

            selectedFiles.forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item';
                
                const icon = getFileIcon(file.type);
                const dirPath = file.path.substring(0, file.path.lastIndexOf('/'));
                
                div.innerHTML = `
                    <span class="file-icon">${icon}</span>
                    <div class="file-info">
                        <span class="file-name">${file.name}</span>
                        ${dirPath ? `<span class="file-path">📁 ${dirPath}</span>` : ''}
                    </div>
                    <span class="file-size">${file.size}</span>
                `;
                selectedFilesDiv.appendChild(div);
            });

            fileList.classList.add('show');
            uploadArea.classList.add('has-files');
            uploadText.textContent = `已选择 ${fileCount} 个文件`;
        }

        function clearFiles() {
            selectedFiles = [];
            uploadFormData = null;
            processCompleted = false;
            currentTaskId = null;
            fileInput.value = '';
            folderInput.value = '';
            fileList.classList.remove('show');
            uploadArea.classList.remove('has-files');
            uploadText.textContent = '点击选择或拖拽文件/文件夹到此处';
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnDownload').disabled = true;
        }

        async function startProcess() {
            if (!uploadFormData) {
                showToast('请先选择文件', 'error');
                return;
            }

            const btnStart = document.getElementById('btnStart');
            btnStart.disabled = true;

            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('progressFill').style.width = '10%';
            document.getElementById('progressText').textContent = '正在上传文件...';

            try {
                document.getElementById('progressFill').style.width = '30%';
                document.getElementById('progressText').textContent = '正在处理数据...';

                const response = await fetch('/fujian/upload', {
                    method: 'POST',
                    body: uploadFormData
                });

                document.getElementById('progressFill').style.width = '80%';
                document.getElementById('progressText').textContent = '正在生成文件...';

                const data = await response.json();

                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressText').textContent = '处理完成';

                setTimeout(() => {
                    document.getElementById('progressSection').style.display = 'none';
                    
                    if (data.success) {
                        processCompleted = true;
                        currentTaskId = data.task_id;
                        document.getElementById('btnDownload').disabled = false;
                        showToast(data.message, 'success');
                    } else {
                        currentTaskId = null;
                        showToast(data.message, 'error');
                    }
                }, 500);

            } catch (error) {
                document.getElementById('progressSection').style.display = 'none';
                showToast('处理失败：' + error.message, 'error');
            } finally {
                btnStart.disabled = false;
            }
        }

        async function downloadFiles() {
            if (!currentTaskId) {
                showToast('请先完成文件处理', 'error');
                return;
            }

            try {
                const response = await fetch(`/fujian/download/${currentTaskId}`, {
                    method: 'GET'
                });

                if (!response.ok) {
                    const data = await response.json();
                    showToast(data.message, 'error');
                    return;
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '提交.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);

                showToast('下载成功！', 'success');
            } catch (error) {
                showToast('下载失败：' + error.message, 'error');
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
